<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zakar'IA — Systems Architect">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F0F1F"/>
      <stop offset="1" stop-color="#160B1E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF1A8C"/>
      <stop offset="0.5" stop-color="#A93AFF"/>
      <stop offset="1" stop-color="#FF6B1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A93AFF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#A93AFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#sky)"/>

  <!-- ambient glow -->
  <circle cx="960" cy="180" r="260" fill="url(#glow)"/>

  <!-- P2P mesh: orbiting nodes on the right -->
  <g transform="translate(960,180)" opacity="0.9">
    <g fill="none" stroke="#3A2A44" stroke-width="1">
      <ellipse rx="150" ry="150"/>
      <ellipse rx="150" ry="60"/>
      <ellipse rx="60" ry="150"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
      <g fill="url(#accent)">
        <circle cx="150" cy="0" r="5"/>
        <circle cx="-150" cy="0" r="5"/>
        <circle cx="0" cy="150" r="4"/>
        <circle cx="0" cy="-150" r="4"/>
        <circle cx="106" cy="106" r="3"/>
        <circle cx="-106" cy="-106" r="3"/>
      </g>
    </g>
    <!-- pulsing core -->
    <circle r="10" fill="#FFD11A">
      <animate attributeName="r" values="8;13;8" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- wordmark -->
  <text x="80" y="160" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="88" font-weight="700" letter-spacing="-2" fill="#F5F5F7">Zakar<tspan fill="#FFD11A">&#39;</tspan>IA</text>

  <!-- accent underline draws in -->
  <rect x="82" y="180" width="0" height="6" rx="3" fill="url(#accent)">
    <animate attributeName="width" from="0" to="412" dur="1.1s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- subtitle -->
  <text x="84" y="222" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="21" font-weight="500" letter-spacing="3" fill="#C9C4D6">SYSTEMS ARCHITECT &#183; FULL-STACK &#183; POST-QUANTUM P2P</text>

  <!-- caption -->
  <text x="84" y="262" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="400" fill="#9E98AD">Founder of <tspan fill="#FF1A8C" font-weight="700">Bellovac&#39;IA</tspan> &#183; don&#39;t trust the server &#8212; prove the code</text>
</svg>
