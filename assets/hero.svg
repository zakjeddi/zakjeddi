<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Zakar'IA — Bellovac'IA liquid chrome hero">
  <defs>
    <radialGradient id="magenta" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FF1A8C"/><stop offset="0.7" stop-color="#FF1A8C" stop-opacity="0"/></radialGradient>
    <radialGradient id="violet" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#A93AFF"/><stop offset="0.7" stop-color="#A93AFF" stop-opacity="0"/></radialGradient>
    <radialGradient id="orange" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FF6B1A"/><stop offset="0.7" stop-color="#FF6B1A" stop-opacity="0"/></radialGradient>
    <radialGradient id="vignette" cx="25%" cy="50%" r="75%"><stop offset="0" stop-color="#0F0F1F" stop-opacity="0.82"/><stop offset="0.4" stop-color="#0F0F1F" stop-opacity="0.5"/><stop offset="0.75" stop-color="#0F0F1F" stop-opacity="0"/></radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FF1A8C"/><stop offset="0.5" stop-color="#A93AFF"/><stop offset="1" stop-color="#FF6B1A"/></linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-width="1"/></pattern>
    <filter id="blur1" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="blur2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="26"/></filter>
    <linearGradient id="chromeBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE59E"/>
      <stop offset="0.25" stop-color="#FF6B1A"/>
      <stop offset="0.5" stop-color="#FF1A8C"/>
      <stop offset="0.75" stop-color="#A93AFF"/>
      <stop offset="1" stop-color="#5B2BD6"/>
    </linearGradient>
    <radialGradient id="chromeShade" cx="50%" cy="50%" r="50%">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0A0410" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="spec" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FF1A8C" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#A93AFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#A93AFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="sphereClip"><circle cx="0" cy="0" r="130"/></clipPath>
    <filter id="liquid" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="2" seed="7" result="noise">
        <animate attributeName="baseFrequency" dur="18s" values="0.008 0.012;0.014 0.008;0.008 0.012" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="26" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="1200" height="380" fill="#0F0F1F"/>

  <g>
    <ellipse cx="160" cy="40" rx="420" ry="360" fill="url(#magenta)" opacity="0.30" filter="url(#blur1)"><animateTransform attributeName="transform" type="translate" values="0 0; 34 20; 0 0" dur="16s" repeatCount="indefinite"/></ellipse>
    <ellipse cx="1080" cy="70" rx="380" ry="320" fill="url(#violet)" opacity="0.24" filter="url(#blur1)"><animateTransform attributeName="transform" type="translate" values="0 0; -30 26; 0 0" dur="21s" repeatCount="indefinite"/></ellipse>
    <ellipse cx="420" cy="360" rx="360" ry="300" fill="url(#orange)" opacity="0.18" filter="url(#blur2)"><animateTransform attributeName="transform" type="translate" values="0 0; 22 -22; 0 0" dur="13s" repeatCount="indefinite"/></ellipse>
  </g>

  <g transform="translate(965,185)">
    <circle r="175" fill="url(#haloG)" filter="url(#blur2)"><animate attributeName="r" values="165;185;165" dur="7s" repeatCount="indefinite"/></circle>
    <g clip-path="url(#sphereClip)">
      <g filter="url(#liquid)">
        <g>
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite"/>
          <rect x="-220" y="-220" width="440" height="440" fill="url(#chromeBase)"/>
          <ellipse cx="-40" cy="-30" rx="120" ry="90" fill="#FF1A8C" opacity="0.55"/>
          <ellipse cx="60" cy="50" rx="110" ry="80" fill="#5B2BD6" opacity="0.5"/>
        </g>
      </g>
      <circle cx="0" cy="0" r="130" fill="url(#chromeShade)"/>
      <ellipse rx="46" ry="34" fill="url(#spec)">
        <animateTransform attributeName="transform" type="translate" values="-44 -50; -20 -60; -50 -40; -44 -50" dur="9s" repeatCount="indefinite"/>
      </ellipse>
      <circle r="8" fill="#ffffff" opacity="0.9">
        <animateTransform attributeName="transform" type="translate" values="-64 -60; -40 -72; -64 -60" dur="9s" repeatCount="indefinite"/>
      </circle>
    </g>
    <circle r="130" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
    <circle r="128" fill="none" stroke="#FF1A8C" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="160 250"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/></circle>
  </g>

  <rect width="1200" height="380" fill="url(#grid)" opacity="0.05"/>
  <rect width="1200" height="380" fill="url(#vignette)"/>
  <rect width="1200" height="380" fill="#0F0F1F" opacity="0.10"/>

  <text x="80" y="92" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600" letter-spacing="2.5" fill="#C9C4D6">&#167; AGENCE WEB &#215; IA &#183; MAROC &amp; FRANCE</text>
  <text x="78" y="182" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="88" font-weight="700" letter-spacing="-2" fill="#F5F5F7">Zakar<tspan fill="#FFD11A">&#39;</tspan>IA</text>
  <rect x="80" y="202" width="0" height="6" rx="3" fill="url(#accent)"><animate attributeName="width" from="0" to="414" dur="1.1s" begin="0.3s" fill="freeze"/></rect>
  <text x="82" y="244" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="500" letter-spacing="0.5" fill="#EDEBF5">Systems Architect &#183; Full-stack &#183; Post-Quantum P2P</text>
  <text x="82" y="286" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="400" fill="#A69FB5">Founder of <tspan fill="#FF1A8C" font-weight="700">Bellovac&#39;IA</tspan> &#183; don&#39;t trust the server &#8212; prove the code</text>
</svg>
