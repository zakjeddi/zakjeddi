<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zakar'IA — Systems Architect">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A0F"/>
      <stop offset="1" stop-color="#0F1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#sky)"/>

  <!-- ambient glow -->
  <circle cx="960" cy="180" r="260" fill="url(#glow)"/>

  <!-- P2P mesh: orbiting nodes on the right -->
  <g transform="translate(960,180)" opacity="0.9">
    <g fill="none" stroke="#1E293B" stroke-width="1">
      <ellipse rx="150" ry="150"/>
      <ellipse rx="150" ry="60"/>
      <ellipse rx="60" ry="150"/>
    </g>
    <!-- rotating ring of nodes -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
      <g fill="url(#accent)">
        <circle cx="150" cy="0" r="5"/>
        <circle cx="-150" cy="0" r="5"/>
        <circle cx="0" cy="150" r="4"/>
        <circle cx="0" cy="-150" r="4"/>
        <circle cx="106" cy="106" r="3"/>
        <circle cx="-106" cy="-106" r="3"/>
      </g>
    </g>
    <!-- pulsing core -->
    <circle r="10" fill="#22D3EE">
      <animate attributeName="r" values="8;13;8" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Typography -->
  <g transform="translate(90,150)">
    <text x="0" y="0" font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif" font-size="76" font-weight="700" fill="#F5F5F7" letter-spacing="-2">Zakar&#39;IA</text>
    <rect x="2" y="26" width="0" height="4" rx="2" fill="url(#accent)">
      <animate attributeName="width" values="0;300" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
    </rect>
    <text x="4" y="70" font-family="'SF Mono','JetBrains Mono',monospace" font-size="19" fill="#94A3B8" letter-spacing="2">SYSTEMS ARCHITECT · RUST · POST-QUANTUM P2P</text>
    <text x="4" y="104" font-family="'SF Mono','JetBrains Mono',monospace" font-size="15" fill="#475569" letter-spacing="1">don&#39;t trust the server — prove the code</text>
  </g>
</svg>
