<line x1="280" y1="0" x2="280" y2="380"/>
<line x1="320" y1="0" x2="320" y2="380"/>
<line x1="360" y1="0" x2="360" y2="380"/>
<line x1="400" y1="0" x2="400" y2="380"/>
<line x1="440" y1="0" x2="440" y2="380"/>
<line x1="480" y1="0" x2="480" y2="380"/>
<line x1="520" y1="0" x2="520" y2="380"/>
<line x1="560" y1="0" x2="560" y2="380"/>
<line x1="600" y1="0" x2="600" y2="380"/>
<line x1="640" y1="0" x2="640" y2="380"/>
<line x1="680" y1="0" x2="680" y2="380"/>
<line x1="720" y1="0" x2="720" y2="380"/>
<line x1="760" y1="0" x2="760" y2="380"/>
<line x1="800" y1="0" x2="800" y2="380"/>
<line x1="840" y1="0" x2="840" y2="380"/>
<line x1="880" y1="0" x2="880" y2="380"/>
<line x1="920" y1="0" x2="920" y2="380"/>
<line x1="960" y1="0" x2="960" y2="380"/>
<line x1="1000" y1="0" x2="1000" y2="380"/>
<line x1="1040" y1="0" x2="1040" y2="380"/>
<line x1="1080" y1="0" x2="1080" y2="380"/>
<line x1="1120" y1="0" x2="1120" y2="380"/>
<line x1="1160" y1="0" x2="1160" y2="380"/>
<line x1="1200" y1="0" x2="1200" y2="380"/>
<line x1="0" y1="0" x2="1200" y2="0"/>
<line x1="0" y1="40" x2="1200" y2="40"/>
<line x1="0" y1="80" x2="1200" y2="80"/>
<line x1="0" y1="120" x2="1200" y2="120"/>
<line x1="0" y1="160" x2="1200" y2="160"/>
<line x1="0" y1="200" x2="1200" y2="200"/>
<line x1="0" y1="240" x2="1200" y2="240"/>
<line x1="0" y1="280" x2="1200" y2="280"/>
<line x1="0" y1="320" x2="1200" y2="320"/>
<line x1="0" y1="360" x2="1200" y2="360"/>
</g>
<rect width="1200" height="380" fill="#0F0F1F" opacity="0.35"/>
<g>
<g transform="rotate(0 930 190)">
<ellipse cx="930" cy="190" rx="175" ry="73.5" fill="none" stroke="#FF1A8C" stroke-width="1" opacity="0.18"/>
<circle r="3.5" fill="#FF1A8C" filter="url(#glow)">
<animateMotion dur="22s" repeatCount="indefinite" path="M 755 190 a 175 73.5 0 1 0 350 0 a 175 73.5 0 1 0 -350 0"/>
</circle>
</g>
<g transform="rotate(120 930 190)">
<ellipse cx="930" cy="190" rx="210" ry="88.2" fill="none" stroke="#A93AFF" stroke-width="1" opacity="0.18"/>
<circle r="3.5" fill="#A93AFF" filter="url(#glow)">
<animateMotion dur="30s" repeatCount="indefinite" path="M 720 190 a 210 88.2 0 1 0 420 0 a 210 88.2 0 1 0 -420 0"/>
</circle>
</g>
<g transform="rotate(240 930 190)">
<ellipse cx="930" cy="190" rx="150" ry="63" fill="none" stroke="#FFD11A" stroke-width="1" opacity="0.18"/>
<circle r="3.5" fill="#FFD11A" filter="url(#glow)">
<animateMotion dur="18s" repeatCount="indefinite" path="M 780 190 a 150 63 0 1 0 300 0 a 150 63 0 1 0 -300 0"/>
</circle>
</g>
</g>
<g filter="url(#glow)">
<circle cx="930" cy="190" r="150" fill="url(#chrome)" opacity="0.18"><animate attributeName="r" dur="4s" values="148;162;148" repeatCount="indefinite"/></circle>
<circle cx="930" cy="190" r="135" fill="url(#chrome)" filter="url(#liquid)"/>
<circle cx="930" cy="190" r="135" fill="url(#sphere)" opacity="0.75"/>
<circle cx="930" cy="190" r="134" fill="none" stroke="url(#chrome)" stroke-width="2.5" opacity="0.9"/>
<ellipse rx="42" ry="28" fill="url(#spec)" clip-path="url(#sphereClip)">
<animate attributeName="cx" dur="6s" values="890;960;890" repeatCount="indefinite"/>
<animate attributeName="cy" dur="6s" values="150;175;150" repeatCount="indefinite"/>
</ellipse>
<circle r="8" fill="#ffffff" clip-path="url(#sphereClip)"><animate attributeName="cx" dur="5s" values="895;900;895" repeatCount="indefinite"/><animate attributeName="cy" dur="5s" values="148;152;148" repeatCount="indefinite"/><animate attributeName="opacity" dur="5s" values="0.9;0.4;0.9" repeatCount="indefinite"/></circle>
</g>
<g font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif">
<text x="70" y="120" font-size="18" letter-spacing="6" fill="#FF1A8C" font-weight="600">BONJOUR, JE SUIS<animate attributeName="opacity" dur="1.2s" values="0;1" fill="freeze"/></text>
<text x="68" y="195" font-size="76" font-weight="800" fill="url(#tg)" letter-spacing="-1">Zakaria Jeddi<animate attributeName="opacity" dur="1.4s" begin="0.2s" values="0;1" fill="freeze"/></text>
<rect x="70" y="212" height="5" rx="2.5" fill="url(#ug)"><animate attributeName="width" dur="1.1s" begin="0.7s" values="0;470" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect>
<text x="70" y="265" font-size="26" font-weight="600" fill="#EDEDF7">
<tspan fill="#A93AFF">Full-Stack</tspan> &amp; <tspan fill="#FF6B1A">AI</tspan> Developer<animate attributeName="opacity" dur="1.4s" begin="0.9s" values="0;1" fill="freeze"/></text>
<text x="70" y="305" font-size="16" letter-spacing="3" fill="#8A8AA8" font-weight="500">BELLOVAC'IA · AGENCE WEB × IA · MAROC &amp; FRANCE<animate attributeName="opacity" dur="1.6s" begin="1.1s" values="0;1" fill="freeze"/></text>
</g>
<rect x="0" y="0" width="1200" height="3" fill="#FFD11A" opacity="0.12"><animate attributeName="y" dur="5s" values="-10;380;-10" repeatCount="indefinite"/></rect>
</svg>
