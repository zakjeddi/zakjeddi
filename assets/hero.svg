<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="Zakaria Jeddi - Bellovac'IA">
<defs>
<radialGradient id="bg" cx="42%" cy="45%" r="85%">
<stop offset="0%" stop-color="#181830"/>
<stop offset="55%" stop-color="#0F0F1F"/>
<stop offset="100%" stop-color="#08080F"/>
</radialGradient>
<linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="objectBoundingBox">
<stop offset="0%" stop-color="#FF1A8C"/>
<stop offset="30%" stop-color="#A93AFF"/>
<stop offset="62%" stop-color="#FF6B1A"/>
<stop offset="88%" stop-color="#FFD11A"/>
<stop offset="100%" stop-color="#FF1A8C"/>
<animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="9s" repeatCount="indefinite"/>
</linearGradient>
<radialGradient id="sphere" cx="38%" cy="32%" r="75%">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
<stop offset="22%" stop-color="#FFD11A" stop-opacity="0.55"/>
<stop offset="55%" stop-color="#A93AFF" stop-opacity="0.85"/>
<stop offset="100%" stop-color="#0F0F1F" stop-opacity="1"/>
</radialGradient>
<radialGradient id="spec" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
<stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
</radialGradient>
<filter id="liquid" x="-30%" y="-30%" width="160%" height="160%">
<feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="3" seed="7" result="noise">
<animate attributeName="baseFrequency" dur="18s" values="0.012 0.016;0.02 0.01;0.012 0.016" repeatCount="indefinite"/>
</feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="noise" scale="26" xChannelSelector="R" yChannelSelector="G"/>
</filter>
<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="9" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="55"/>
</filter>
<linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#FFD8EC"/>
</linearGradient>
<linearGradient id="ug" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#FF1A8C"/>
<stop offset="50%" stop-color="#A93AFF"/>
<stop offset="100%" stop-color="#FF6B1A"/>
</linearGradient>
<clipPath id="sphereClip"><circle cx="930" cy="190" r="135"/></clipPath>
</defs>
<rect width="1200" height="380" fill="url(#bg)"/>
<g filter="url(#soft)">
<circle cx="200" cy="80" r="190" fill="#FF1A8C" opacity="0.28"><animate attributeName="cx" dur="14s" values="200;260;200" repeatCount="indefinite"/></circle>
<circle cx="1050" cy="60" r="160" fill="#A93AFF" opacity="0.22"><animate attributeName="cy" dur="16s" values="60;120;60" repeatCount="indefinite"/></circle>
<circle cx="260" cy="340" r="150" fill="#FF6B1A" opacity="0.18"><animate attributeName="cx" dur="18s" values="260;180;260" repeatCount="indefinite"/></circle>
</g>
<g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
<line x1="0" y1="0" x2="0" y2="380"/>
<line x1="40" y1="0" x2="40" y2="380"/>
<line x1="80" y1="0" x2="80" y2="380"/>
<line x1="120" y1="0" x2="120" y2="380"/>
