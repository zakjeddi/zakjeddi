<style>.hName{font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;font-weight:700;} .hMono{font-family:'SFMono-Regular',ui-monospace,Menlo,monospace;} .hBody{font-family:'Segoe UI',system-ui,sans-serif;}</style>
