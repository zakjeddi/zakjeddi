<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zakar'IA — Bellovac'IA hero">
  <defs>
    <radialGradient id="magenta" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FF1A8C"/>
      <stop offset="0.7" stop-color="#FF1A8C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#A93AFF"/>
      <stop offset="0.7" stop-color="#A93AFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orange" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FF6B1A"/>
      <stop offset="0.7" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="chrome" cx="38%" cy="34%" r="72%">
      <stop offset="0" stop-color="#FFE59E"/>
      <stop offset="0.28" stop-color="#FF6B1A"/>
      <stop offset="0.6" stop-color="#FF1A8C"/>
      <stop offset="1" stop-color="#A93AFF"/>
    </radialGradient>
    <radialGradient id="sphereHi" cx="34%" cy="28%" r="40%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="25%" cy="50%" r="75%">
      <stop offset="0" stop-color="#0F0F1F" stop-opacity="0.82"/>
      <stop offset="0.4" stop-color="#0F0F1F" stop-opacity="0.5"/>
      <stop offset="0.75" stop-color="#0F0F1F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF1A8C"/>
      <stop offset="0.5" stop-color="#A93AFF"/>
      <stop offset="1" stop-color="#FF6B1A"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-width="1"/>
    </pattern>
    <filter id="blur1" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="blur2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="26"/></filter>
  </defs>

  <rect width="1200" height="380" fill="#0F0F1F"/>

  <g>
    <ellipse cx="160" cy="40" rx="420" ry="360" fill="url(#magenta)" opacity="0.30" filter="url(#blur1)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 34 20; 0 0" dur="16s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1080" cy="70" rx="380" ry="320" fill="url(#violet)" opacity="0.24" filter="url(#blur1)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -30 26; 0 0" dur="21s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="420" cy="360" rx="360" ry="300" fill="url(#orange)" opacity="0.18" filter="url(#blur2)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 22 -22; 0 0" dur="13s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g transform="translate(965,185)">
    <ellipse rx="168" ry="168" fill="url(#chrome)" opacity="0.5" filter="url(#blur2)"/>
    <circle r="132" fill="url(#chrome)">
      <animate attributeName="r" values="128;136;128" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle r="132" fill="url(#sphereHi)"/>
    <circle r="132" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  </g>

  <rect width="1200" height="380" fill="url(#grid)" opacity="0.05"/>
  <rect width="1200" height="380" fill="url(#vignette)"/>
  <rect x="0" y="0" width="1200" height="380" fill="#0F0F1F" opacity="0.10"/>

  <text x="80" y="92" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600" letter-spacing="2.5" fill="#C9C4D6">&#167; AGENCE WEB &#215; IA &#183; MAROC &amp; FRANCE</text>
  <text x="78" y="182" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="88" font-weight="700" letter-spacing="-2" fill="#F5F5F7">Zakar<tspan fill="#FFD11A">&#39;</tspan>IA</text>
  <rect x="80" y="202" width="0" height="6" rx="3" fill="url(#accent)">
    <animate attributeName="width" from="0" to="414" dur="1.1s" begin="0.3s" fill="freeze"/>
  </rect>
  <text x="82" y="244" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="500" letter-spacing="0.5" fill="#EDEBF5">Systems Architect &#183; Full-stack &#183; Post-Quantum P2P</text>
  <text x="82" y="286" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="400" fill="#A69FB5">Founder of <tspan fill="#FF1A8C" font-weight="700">Bellovac&#39;IA</tspan> &#183; don&#39;t trust the server &#8212; prove the code</text>
</svg>
