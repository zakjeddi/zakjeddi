<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="Zakar'IA — Systems Architect. Bellovacia gradient identity.">
  <defs>
    <!-- Bellovac'IA signature gradient: magenta -> violet -> orange -->
    <linearGradient id="signature" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF1A8C"/>
      <stop offset="50%" stop-color="#A93AFF"/>
      <stop offset="100%" stop-color="#FF6B1A"/>
    </linearGradient>
    <linearGradient id="signatureShift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B1A"/>
      <stop offset="50%" stop-color="#FF1A8C"/>
      <stop offset="100%" stop-color="#A93AFF"/>
    </linearGradient>
    <radialGradient id="chrome" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFD11A" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#FF1A8C" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#A93AFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0.75"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4e9ff"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Nuit background (#0F0F1F, the single Bellovac'IA background) -->
  <rect width="1200" height="380" fill="#0F0F1F"/>

  <!-- soft ambient gradient wash -->
  <rect width="1200" height="380" fill="url(#signature)" opacity="0.06"/>

  <!-- Liquid-chrome blob (echoes the Spline hero) — right side, morphing + rotating -->
  <g transform="translate(960,190)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="26s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="150" ry="150" fill="url(#chrome)" filter="url(#soft)" opacity="0.55"/>
      <path fill="url(#chrome)" filter="url(#glow)" opacity="0.92"
        d="M0,-120 C70,-120 130,-60 128,10 C126,80 60,128 -6,124 C-78,120 -128,66 -122,-8 C-116,-78 -70,-120 0,-120 Z">
        <animate attributeName="d" dur="9s" repeatCount="indefinite"
          values="
          M0,-120 C70,-120 130,-60 128,10 C126,80 60,128 -6,124 C-78,120 -128,66 -122,-8 C-116,-78 -70,-120 0,-120 Z;
          M4,-128 C86,-118 122,-52 118,18 C114,92 44,132 -22,120 C-92,108 -132,52 -120,-20 C-108,-86 -60,-136 4,-128 Z;
          M-6,-116 C64,-124 134,-70 130,4 C126,84 66,134 -10,126 C-84,118 -124,60 -118,-14 C-112,-82 -66,-108 -6,-116 Z;
          M0,-120 C70,-120 130,-60 128,10 C126,80 60,128 -6,124 C-78,120 -128,66 -122,-8 C-116,-78 -70,-120 0,-120 Z"/>
      </path>
    </g>
    <!-- gecko-yellow accent orb orbiting the blob -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="14s" repeatCount="indefinite"/>
      <circle cx="150" cy="0" r="12" fill="#FFD11A" filter="url(#glow)"/>
    </g>
  </g>

  <!-- Wordmark: Zakar'IA -->
  <text x="80" y="170" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="92" font-weight="700" letter-spacing="-2" fill="url(#wordmark)">Zakar<tspan fill="#FFD11A">&#39;</tspan>IA</text>

  <!-- animated accent underline in the signature gradient -->
  <rect x="82" y="192" width="0" height="7" rx="3.5" fill="url(#signatureShift)">
    <animate attributeName="width" from="0" to="430" dur="1.1s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- Role / subtitle -->
  <text x="84" y="238" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="27" font-weight="500" letter-spacing="0.5" fill="#EDEBF5">Systems Architect &#183; Full-stack &#183; Post-Quantum P2P</text>

  <!-- Bellovacia line -->
  <text x="84" y="286" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="19" font-weight="500" letter-spacing="0.3" fill="#B9B4C9">Founder of <tspan fill="#FF1A8C" font-weight="700">Bellovac&#39;IA</tspan> &#183; agence webmarketing &#215; IA &#183; Beauvais</text>
</svg>
